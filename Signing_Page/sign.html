<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DesiCart</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="favicon.ico">
    <link rel="icon" type="image/png" href="favicon-32x32.png">
</head>
<body>
    <div class="container">
        
        <div class="image-section">

            <img id="sideImage" src="" alt="Design Image">
        </div>


        <div class="form-section">
            

            <div id="loginForm" class="form-container active">
                <button class="back-btn">←</button>
                
                <h1>Log in</h1>
                <p class="switch-text">
                    Don't have an account? 
                    <a href="#" onclick="showSignup()">Create an Account</a>
                </p>

                <form>
                    <div class="form-group">
                        <label>Email Address</label>
                        <input type="email" placeholder="Email Address" required>
                    </div>

                    <div class="form-group">
                        <label>Password</label>
                        <div class="password-input">
                            <input type="password" id="loginPassword" placeholder="Password" required>
                            <button type="button" class="toggle-password" onclick="togglePassword('loginPassword')">
                                👁️
                            </button>
                        </div>
                        <a href="#" class="forgot-password">Forgot Password?</a>
                    </div>

                    <button type="submit" class="submit-btn">Log in</button>


                    <div class="divider">or</div>

                    <div class="social-buttons">
                        <button type="button" class="social-btn google-btn">
                            <span class="google-icon">G</span>
                            Continue with Google
                        </button>
                        <button type="button" class="social-btn facebook-btn">
                            <span class="facebook-icon">f</span>
                            Continue with Facebook
                        </button>
                    </div>
                </form>
            </div>

    
            <div id="signupForm" class="form-container">
                <button class="back-btn">←</button>
                
                <h1>Create an Account</h1>
                <p class="switch-text">
                    Already have an account? 
                    <a href="#" onclick="showLogin()">Log in</a>
                </p>

                <form>
                    <div class="name-row">
                        <div class="form-group">
                            <label>First Name</label>
                            <input type="text" placeholder="John" required>
                        </div>
                        <div class="form-group">
                            <label>Last Name</label>
                            <input type="text" placeholder="Last Name" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Email Address</label>
                        <input type="email" placeholder="Email Address" required>
                    </div>

                    <div class="form-group">
                        <label>Password</label>
                        <div class="password-input">
                            <input type="password" id="signupPassword" placeholder="Password" required>
                            <button type="button" class="toggle-password" onclick="togglePassword('signupPassword')">
                                👁️
                            </button>
                        </div>
                    </div>

                    <button type="submit" class="submit-btn">Create Account</button>

                    <div class="divider">or</div>

                    <div class="social-buttons">
                        <button type="button" class="social-btn google-btn">
                            <span class="google-icon">G</span>
                            Continue with Google
                        </button>
                        <button type="button" class="social-btn facebook-btn">
                            <span class="facebook-icon">f</span>
                            Continue with Facebook
                        </button>
                    </div>
                </form>
            </div>

        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
